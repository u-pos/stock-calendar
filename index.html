<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>株イベントカレンダー</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
}

/* ヘッダー */
.header-bar {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#222;
  color:#fff;
}

/* グリッド */
.grid {
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  height:calc(100vh - 60px);
}
#grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}

/* 曜日 */
.header {
  height: 30px;           /* ←最小化 */
  font-size: 12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#eee;
}

/* セル */
.cell {
  height: 120px;          /* ←固定で均等 */
  border: 1px solid #ccc;
  padding: 4px;
  overflow: hidden;       /* ←はみ出し防止 */
  display:flex;
  flex-direction: column;
}

/* 日付 */
.date {
  font-size: 12px;
  font-weight: bold;
}

/* 日経 */
.nikkei {
  font-size: 11px;
}
.nikkei.up { color: red; }
.nikkei.down { color: blue; }

/* ニュース */
ul {
  margin: 2px 0 0 0;
  padding-left: 14px;
  font-size: 11px;
  overflow: hidden;
}

li {
  line-height: 1.2;
}
/* セル */
.cell {
  border:1px solid #ccc;
  padding:4px;
  font-size:12px;
  overflow:hidden;
}

/* 日付 */
.date {
  font-weight:bold;
}

/* 日経表示 */
.nikkei {
  font-size:11px;
}

/* 上げ下げ */
.up { color:green; }
.down { color:red; }

/* 曜日ヘッダー */
.header {
  font-size:11px;
  text-align:center;
  padding:2px 0;
  font-weight:bold;
}

/* 曜日色 */
.sun { background:#ffdddd; }
.sat { background:#dde5ff; }
.week { background:#eeeeee; }

ul {
  padding-left:12px;
  margin:2px 0;
}
</style>
</head>

<body>

<div class="header-bar">
  <button onclick="prev()">←</button>
  <div id="title"></div>
  <button onclick="next()">→</button>
</div>

<div id="grid" class="grid"></div>

<script type="module" src="script.js"></script>
</body>
</html>
